<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTA ONE 6图排版器 2.0</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <span class="brand-kicker">ASTA ONE</span>
        <div>
          <h1>6图排版器 2.0</h1>
          <p>全球 AI 机会翻译站 · 1242 × 1660 px</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="saveStatus" class="save-status">已自动保存</span>
        <button id="newProjectBtn" class="quiet" type="button">新建</button>
        <button id="duplicateProjectBtn" class="quiet" type="button">另存为</button>
        <button id="previewAllBtn" type="button">预览全部</button>
        <button id="exportAllBtn" class="primary" type="button">导出全部</button>
      </div>
    </header>

    <main class="workbench">
      <aside class="page-rail" aria-label="六图页面导航">
        <div class="rail-heading">
          <span>页面</span>
          <button id="projectSettingsBtn" class="text-button" type="button">项目设置</button>
        </div>
        <div id="pageNav" class="page-nav"></div>
      </aside>

      <section class="editor-column">
        <div class="editor-heading">
          <div>
            <span id="editorEyebrow" class="eyebrow">图 01 · 封面</span>
            <h2 id="editorTitle">编辑封面</h2>
          </div>
          <span id="pageState" class="page-state">未完成</span>
        </div>
        <form id="pageEditor" class="editor-form"></form>
        <div class="editor-footer">
          <button id="previousPageBtn" type="button">上一页</button>
          <button id="nextPageBtn" type="button">下一页</button>
          <span id="overflowSummary" class="overflow-summary"></span>
          <button id="exportCurrentBtn" class="primary" type="button">导出当前页</button>
        </div>
      </section>

      <section class="preview-column">
        <div class="preview-toolbar">
          <div>
            <span class="eyebrow">实时预览</span>
            <p>预览与 PNG 使用同一渲染画布</p>
          </div>
          <div class="preview-controls">
            <label class="compact-select">缩放
              <select id="previewScale">
                <option value="0.24">24%</option>
                <option value="0.30" selected>30%</option>
                <option value="0.36">36%</option>
                <option value="0.42">42%</option>
              </select>
            </label>
            <label class="switch"><input id="showSafeArea" type="checkbox" /> <span>安全区</span></label>
          </div>
        </div>
        <div id="previewStage" class="preview-stage">
          <canvas id="previewCanvas" width="1242" height="1660" aria-label="当前页面预览"></canvas>
        </div>
        <div id="previewNotice" class="preview-notice" role="status"></div>
      </section>
    </main>

    <dialog id="projectDialog" class="project-dialog">
      <form method="dialog" class="dialog-card">
        <div class="dialog-heading">
          <div><span class="eyebrow">项目设置</span><h2>当前项目</h2></div>
          <button class="icon-button" value="cancel" aria-label="关闭" title="关闭" type="submit">×</button>
        </div>
        <div class="dialog-grid">
          <label>项目名称 <input id="projectName" maxlength="40" placeholder="例如：AI 眼镜正在改变什么" /></label>
          <label>内容栏目
            <select id="category">
              <option>海外AI新发现</option>
              <option>AI赚钱样本</option>
              <option>免费资源中文说明</option>
              <option>AI工作流</option>
              <option>自定义</option>
            </select>
          </label>
          <label>版式模板
            <select id="template">
              <option value="minimal">模板A｜极简信息卡</option>
              <option value="evidence">模板B｜截图增强型</option>
              <option value="magazine">模板C｜轻科技杂志感</option>
            </select>
          </label>
          <label>字号密度
            <select id="density">
              <option value="comfortable">舒适</option>
              <option value="standard" selected>标准</option>
              <option value="compact">紧凑</option>
            </select>
          </label>
          <label>栏目小标签 <input id="columnLabel" maxlength="24" placeholder="例如：AI DISCOVERY" /></label>
          <label>平台标签 <input id="platformLabel" maxlength="24" placeholder="例如：GitHub" /></label>
          <label>内容日期 <input id="contentDate" type="date" /></label>
          <label>来源链接（仅内部保存） <input id="sourceUrl" type="url" placeholder="https://..." /></label>
          <label class="wide-field">作者备注（不展示） <textarea id="authorNote" rows="3" placeholder="记录选题背景或发布提醒"></textarea></label>
        </div>
        <div class="dialog-switches">
          <label class="switch"><input id="showBrand" type="checkbox" checked /> <span>显示 ASTA ONE｜人类生活说明书</span></label>
          <label class="switch"><input id="showSources" type="checkbox" checked /> <span>显示来源信息</span></label>
          <label class="switch"><input id="showTags" type="checkbox" checked /> <span>显示标签</span></label>
        </div>
        <div class="dialog-actions"><button value="cancel" type="submit">取消</button><button id="saveProjectSettingsBtn" class="primary" value="default" type="button">保存设置</button></div>
      </form>
    </dialog>

    <dialog id="overviewDialog" class="overview-dialog">
      <div class="overview-card">
        <div class="dialog-heading">
          <div><span class="eyebrow">导出前检查</span><h2 id="overviewTitle">六图总览</h2></div>
          <button id="closeOverviewBtn" class="icon-button" aria-label="关闭" title="关闭" type="button">×</button>
        </div>
        <div id="overviewIssues" class="overview-issues"></div>
        <div id="overviewGrid" class="overview-grid"></div>
        <div class="dialog-actions"><button id="backToEditBtn" type="button">返回编辑</button><button id="overviewExportBtn" class="primary" type="button">导出全部 PNG</button></div>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status"></div>
    <script src="./media-frame.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
